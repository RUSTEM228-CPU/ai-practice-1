<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Әзірлеушіге арналған ЖИ-құралдары</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Әзірлеушіге арналған ЖИ-құралдары</h1>
    
    <div class="card-container">
        <div class="card">
            <h3>GitHub Copilot</h3>
            <p>Код жазуға көмектесетін ЖИ ассистент.</p>
            <a href="https://github.com/features/copilot">Ресми сайт</a>
        </div>
        </div>

    <section id="chat-section">
        <h2>ЖИ-мен чат</h2>
        <input type="text" id="user-input" placeholder="Сұрақ қойыңыз...">
        <button onclick="sendMessage()">Жіберу</button>
        <div id="chat-output"></div>
        <p>Жіберілген сұрақтар саны: <span id="counter">0</span></p>
    </section>

    <button id="theme-toggle">Қараңғы тақырып</button>

    <script src="script.js"></script>
</body>
</html>
